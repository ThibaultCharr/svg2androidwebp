name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyobjc-framework-Cocoa cairosvg Pillow py2app

      - name: Build .app
        run: |
          python setup.py py2app

      - name: Zip .app
        run: |
          cd dist
          zip -r SVG2AndroidWebP.zip SVG2AndroidWebP.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SVG2AndroidWebP.zip
          generate_release_notes: true
